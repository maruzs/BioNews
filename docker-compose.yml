# ============================================================
# BioNews - Docker Compose (Clustering & Reverse Proxy Ready)
# ============================================================
# Configurado para funcionar con Nginx Proxy Manager (NPM)
# y compatible con Docker Swarm / Stack.
# ============================================================

services:

  # ── PostgreSQL Única (Esquemas Users y Scrapers) ─────────────
  postgres-db:
    image: postgres:16-alpine
    container_name: bionews-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       ${DB_NAME:-bionews}
      POSTGRES_USER:     ${DB_USER:-bionews}
      POSTGRES_PASSWORD: ${DB_PASS:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/database/schema_users.sql:/docker-entrypoint-initdb.d/01_schema_users.sql:ro
      - ./src/database/schema_scrapers.sql:/docker-entrypoint-initdb.d/02_schema_scrapers.sql:ro
    networks:
      - bionews-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bionews} -d ${DB_NAME:-bionews}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis (Caché de consultas y optimización) ───────────────
  redis:
    image: redis:7-alpine
    container_name: bionews-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - bionews-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend FastAPI ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bionews-api
    restart: unless-stopped
    volumes:
      - /opt/BioNews/logs:/app/logs
      - /opt/BioNews/uploads:/app/uploads
      - /etc/localtime:/etc/localtime:ro
    expose:
      - "8000"
    networks:
      - bionews-net
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    environment:
      - TZ=America/Santiago
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-bionews}
      - DB_USER=${DB_USER:-bionews}
      - DB_PASS=${DB_PASS:-changeme}
      - REDIS_ENABLED=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

  # ── Scheduler de Scrapers ───────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bionews-scheduler
    restart: unless-stopped
    command: [ "python", "scheduler.py" ]
    volumes:
      - /opt/BioNews/logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
    networks:
      - bionews-net
    depends_on:
      api:
        condition: service_healthy
    environment:
      - TZ=America/Santiago
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-bionews}
      - DB_USER=${DB_USER:-bionews}
      - DB_PASS=${DB_PASS:-changeme}
      - REDIS_ENABLED=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

  # ── Frontend (Nginx + React build) ──────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: bionews-web
    restart: unless-stopped
    networks:
      - bionews-net
      - proxy_network
    depends_on:
      api:
        condition: service_healthy
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

# Volúmenes persistentes para PostgreSQL
volumes:
  pgdata:

# Redes
networks:
  # Red interna para comunicación privada entre servicios de BioNews
  bionews-net:
    driver: bridge
  # Red externa compartida con Nginx Proxy Manager
  proxy_network:
    external: true
