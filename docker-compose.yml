# ============================================================
# BioNews - Docker Compose (Clustering & Reverse Proxy Ready)
# ============================================================
# Configurado para funcionar con Nginx Proxy Manager (NPM)
# y compatible con Docker Swarm / Stack.
# ============================================================

services:

  # ── PostgreSQL Usuarios ──────────────────────────────────────
  postgres-users:
    image: postgres:16-alpine
    container_name: bionews-db-users
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB:       ${DB_USERS_NAME:-bionews_users}
      POSTGRES_USER:     ${DB_USERS_USER:-bionews}
      POSTGRES_PASSWORD: ${DB_USERS_PASS}
    volumes:
      - pgdata_users:/var/lib/postgresql/data
      - ./src/database/schema_users.sql:/docker-entrypoint-initdb.d/01_schema_users.sql:ro
    networks:
      - bionews-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERS_USER:-bionews} -d ${DB_USERS_NAME:-bionews_users}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── PostgreSQL Scrapers ──────────────────────────────────────
  postgres-scrapers:
    image: postgres:16-alpine
    container_name: bionews-db-scrapers
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB:       ${DB_SCRAPERS_NAME:-bionews_scrapers}
      POSTGRES_USER:     ${DB_SCRAPERS_USER:-bionews}
      POSTGRES_PASSWORD: ${DB_SCRAPERS_PASS}
    volumes:
      - pgdata_scrapers:/var/lib/postgresql/data
      - ./src/database/schema_scrapers.sql:/docker-entrypoint-initdb.d/01_schema_scrapers.sql:ro
    networks:
      - bionews-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_SCRAPERS_USER:-bionews} -d ${DB_SCRAPERS_NAME:-bionews_scrapers}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Backend FastAPI ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bionews-api
    restart: unless-stopped
    volumes:
      - /opt/BioNews/logs:/app/logs
      - /opt/BioNews/uploads:/app/uploads
      - /etc/localtime:/etc/localtime:ro
    expose:
      - "8000"
    networks:
      - bionews-net
    depends_on:
      postgres-users:
        condition: service_healthy
      postgres-scrapers:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    environment:
      - TZ=America/Santiago
      - DB_USERS_HOST=postgres-users
      - DB_USERS_PORT=5432
      - DB_USERS_NAME=${DB_USERS_NAME:-bionews_users}
      - DB_USERS_USER=${DB_USERS_USER:-bionews}
      - DB_USERS_PASS=${DB_USERS_PASS}
      - DB_SCRAPERS_HOST=postgres-scrapers
      - DB_SCRAPERS_PORT=5432
      - DB_SCRAPERS_NAME=${DB_SCRAPERS_NAME:-bionews_scrapers}
      - DB_SCRAPERS_USER=${DB_SCRAPERS_USER:-bionews}
      - DB_SCRAPERS_PASS=${DB_SCRAPERS_PASS}
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

  # ── Scheduler de Scrapers ───────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bionews-scheduler
    restart: unless-stopped
    command: [ "python", "scheduler.py" ]
    volumes:
      - /opt/BioNews/logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
    networks:
      - bionews-net
    depends_on:
      api:
        condition: service_healthy
    environment:
      - TZ=America/Santiago
      - DB_USERS_HOST=postgres-users
      - DB_USERS_PORT=5432
      - DB_USERS_NAME=${DB_USERS_NAME:-bionews_users}
      - DB_USERS_USER=${DB_USERS_USER:-bionews}
      - DB_USERS_PASS=${DB_USERS_PASS}
      - DB_SCRAPERS_HOST=postgres-scrapers
      - DB_SCRAPERS_PORT=5432
      - DB_SCRAPERS_NAME=${DB_SCRAPERS_NAME:-bionews_scrapers}
      - DB_SCRAPERS_USER=${DB_SCRAPERS_USER:-bionews}
      - DB_SCRAPERS_PASS=${DB_SCRAPERS_PASS}
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

  # ── Frontend (Nginx + React build) ──────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: bionews-web
    restart: unless-stopped
    networks:
      - bionews-net
      - proxy_network
    depends_on:
      api:
        condition: service_healthy
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

# Volúmenes persistentes para PostgreSQL
volumes:
  pgdata_users:
  pgdata_scrapers:

# Redes
networks:
  # Red interna para comunicación privada entre servicios de BioNews
  bionews-net:
    driver: bridge
  # Red externa compartida con Nginx Proxy Manager
  proxy_network:
    external: true
