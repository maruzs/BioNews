# /etc/nginx/sites-available/bionews
# Copiar este archivo al servidor y habilitarlo:
#   sudo cp bionews.nginx.conf /etc/nginx/sites-available/bionews
#   sudo ln -s /etc/nginx/sites-available/bionews /etc/nginx/sites-enabled/bionews
#   sudo nginx -t
#   sudo systemctl reload nginx

server {
    listen 80;
    server_name _;   # Acepta cualquier hostname / IP (Tailscale, LAN, etc.)

    # Proxy todo al contenedor Docker del frontend
    location / {
        proxy_pass http://127.0.0.1:3080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts para scrapers
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }
}
