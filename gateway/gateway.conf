server {
    listen 8000;

    # DNS interno de Docker para resolución dinámica
    resolver 127.0.0.11 valid=10s;

    location ~ ^/api/(auth|users|favorites|bugs|admin/users|admin/bugs) {
        set $auth_backend "bionews-auth-service:8001";
        proxy_pass http://$auth_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/news {
        set $news_backend "bionews-news-service:8002";
        proxy_pass http://$news_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/api/(data|options|admin/debug/delete-latest|search) {
        set $legal_backend "bionews-legal-service:8003";
        proxy_pass http://$legal_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/api/(consultas|minsal) {
        set $consultations_backend "bionews-consultations-service:8004";
        proxy_pass http://$consultations_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
