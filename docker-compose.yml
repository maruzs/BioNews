# ============================================================
# BioNews - Docker Compose (Clustering & Reverse Proxy Ready)
# ============================================================
# Configurado para funcionar con Nginx Proxy Manager (NPM)
# y compatible con Docker Swarm / Stack.
#
# FASE 1 MICROSERVICIOS: Se añaden PostgreSQL y Redis como
# infraestructura de datos para la migración gradual desde SQLite.
# ============================================================

services:

  # ── PostgreSQL (Base de Datos Centralizada) ─────────────────
  postgres_db:
    image: postgres:15-alpine
    container_name: bionews-postgres
    restart: always
    environment:
      POSTGRES_USER: bionews_admin
      POSTGRES_PASSWORD: secret_master_password
      POSTGRES_DB: bionews_master
      POSTGRES_MULTIPLE_DATABASES: bionews_users_db,bionews_news_db,bionews_legal_db,bionews_consultations_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh:ro
    ports:
      - "5432:5432"
    networks:
      - bionews-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U bionews_admin -d bionews_master" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

  # ── Redis (Message Broker / Caché) ──────────────────────────
  redis_broker:
    image: redis:7-alpine
    container_name: bionews-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - bionews-net
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

  # ── Backend FastAPI ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bionews-api
    restart: unless-stopped
    volumes:
      - /opt/BioNews/data:/app/data
      - /opt/BioNews/logs:/app/logs
      - /opt/BioNews/uploads:/app/uploads
      - /etc/localtime:/etc/localtime:ro
    expose:
      - "8000"
    networks:
      - bionews-net
    depends_on:
      postgres_db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    environment:
      - TZ=America/Santiago
      # Conexiones a PostgreSQL (disponibles para futura integración)
      - POSTGRES_HOST=postgres_db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=bionews_admin
      - POSTGRES_PASSWORD=secret_master_password
      - REDIS_URL=redis://redis_broker:6379/0
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

  # ── Scheduler de Scrapers ───────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bionews-scheduler
    restart: unless-stopped
    command: [ "python", "scheduler.py" ]
    volumes:
      - /opt/BioNews/data:/app/data
      - /opt/BioNews/logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
    networks:
      - bionews-net
    depends_on:
      api:
        condition: service_healthy
    environment:
      - TZ=America/Santiago
      - POSTGRES_HOST=postgres_db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=bionews_admin
      - POSTGRES_PASSWORD=secret_master_password
      - REDIS_URL=redis://redis_broker:6379/0
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

  # ── Frontend (Nginx + React build) ──────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: bionews-web
    restart: unless-stopped
    # Puertos: Se eliminan (3080:80) para usar el Reverse Proxy de NPM
    networks:
      - bionews-net
      - proxy_network
    depends_on:
      api:
        condition: service_healthy
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

# Volúmenes
volumes:
  postgres_data:
    driver: local

# Redes
networks:
  # Red interna para comunicación privada entre servicios de BioNews
  bionews-net:
    driver: bridge
  # Red externa compartida con Nginx Proxy Manager
  proxy_network:
    external: true
