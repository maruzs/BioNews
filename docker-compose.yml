# ============================================================
# BioNews - Docker Compose (Clustering & Reverse Proxy Ready)
# ============================================================
# Configurado para funcionar con Nginx Proxy Manager (NPM)
# y compatible con Docker Swarm / Stack.
# ============================================================

services:

  # ── Backend FastAPI ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bionews-api
    restart: unless-stopped
    volumes:
      - /opt/BioNews/data:/app/data
      - /opt/BioNews/logs:/app/logs
      - /opt/BioNews/uploads:/app/uploads
      - /etc/localtime:/etc/localtime:ro
    expose:
      - "8000"
    networks:
      - bionews-net
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    environment:
      - TZ=America/Santiago
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

  # ── Scheduler de Scrapers ───────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bionews-scheduler
    restart: unless-stopped
    command: [ "python", "scheduler.py" ]
    volumes:
      - /opt/BioNews/data:/app/data
      - /opt/BioNews/logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
    networks:
      - bionews-net
    depends_on:
      api:
        condition: service_healthy
    environment:
      - TZ=America/Santiago
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

  # ── Frontend (Nginx + React build) ──────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: bionews-web
    restart: unless-stopped
    # Puertos: Se eliminan (3080:80) para usar el Reverse Proxy de NPM
    networks:
      - bionews-net
      - proxy_network
    depends_on:
      api:
        condition: service_healthy
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

# Redes
networks:
  # Red interna para comunicación privada entre servicios de BioNews
  bionews-net:
    driver: bridge
  # Red externa compartida con Nginx Proxy Manager
  proxy_network:
    external: true
